spring:
  application:
    name: roland-tone-library

  datasource:
    # Defaults = de lokale dev-DB uit deploy/docker-compose.dev.yml, zodat een
    # native/IntelliJ-run zonder env-vars meteen verbindt. Prod en de Docker-
    # stacks zetten DB_URL/DB_USERNAME/DB_PASSWORD altijd expliciet via env.
    #   Prod/server:    DB_URL=jdbc:postgresql://<hostname>:5432/pianosounds
    #   Docker Compose: jdbc:postgresql://db:5432/pianosounds(_dev)
    url: ${DB_URL:jdbc:postgresql://localhost:55432/pianosounds_dev}
    username: ${DB_USERNAME:pianosounds_dev_user}
    password: ${DB_PASSWORD:devpass}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    cache-names: wikiSummaries, wikiHtml
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=24h

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info

app:
  seed:
    # Set SEED_ENABLED=false to skip seeding at startup.
    # Seeding is idempotent, so restarting will not create duplicates.
    enabled: ${SEED_ENABLED:true}
  cors:
    # Comma-separated frontend origins allowed to call this API.
    # Override this on the server with CORS_ALLOWED_ORIGINS.
    # Include every public frontend URL that calls the backend.
    # Do not use "*" when credentials are enabled.
    # Do not add a trailing comma.
    # http://100.*.*.*:3000 staat dev-toegang via het Tailscale-subnet toe.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://100.*.*.*:3000,https://roland-lx708-tone-library-poc.vercel.app,https://roland-lx708-tone-library-poc-git-main-jer-novis-projects.vercel.app}
  wikipedia:
    base-url: https://en.wikipedia.org/api/rest_v1
    # Be polite to the Wikipedia API: minimum delay between bulk requests (ms)
    bulk-delay-ms: 250
    # Vul ontbrekende wiki-data (incl. kaart-thumbnails) automatisch op een
    # achtergrondthread bij het opstarten
    warmup-enabled: ${WIKI_WARMUP_ENABLED:true}
  thumbnails:
    # Lokale opslag voor gedownloade thumbnails (per tone één bestand).
    # In Docker wordt dit volume-gemount zodat bestanden bewaard blijven
    # na een herstart van de api-container.
    storage-dir: ${THUMBNAILS_DIR:./data/wiki-thumbs}
    # URL-prefix waaronder de ThumbnailController de bestanden serveert.
    # Past dit aan wanneer we later naar een dedicated image host gaan.
    url-prefix: ${THUMBNAILS_URL_PREFIX:/api/wiki-thumbs/}
    # Voor lokale images (van allthemusicalinstrumentsoftheworld.com) — deze
    # worden in de repo gebundeld of gemount als volume, en hebben voorrang
    # op de Wikipedia-lookup. Per tone één bestand: "{category}__{tn}.jpg".
    local-images-dir: ${LOCAL_THUMBNAILS_DIR:./data/instrument-images}
    # MIMO fallback mapping (gegenereerd door scripts/scrape_mimo.py).
    # Keyed by wikipediaPageTitle; value is de og:image URL van het
    # museum-object plus de detail-URL voor een "Bekijk op MIMO"-knop.
    mimo-refs: ${MIMO_REFS_FILE:./data/mimo_image_references.json}
    # Statische emoji-iconen (SVG) voor tonen zonder enige foto-bron
    # (GM2 sound-effects, Do Re Mi-demotonen). Gegenereerd door
    # scripts/generate_static_icons.py, gebundeld in de Docker-image.
    static-icons-dir: ${STATIC_ICONS_DIR:./data/static-icons}
    # HD-storage: tweede directory met hogere-resolutie varianten,
    # geserveerd onder /api/wiki-thumbs-hd/. Maximale bestandsgrootte
    # is hoger dan SD (12MB vs 5MB) omdat HD-JPEGs 1600-2560px kunnen zijn.
    hd-storage-dir: ${HD_THUMBNAILS_DIR:./data/wiki-thumbs-hd}
    hd-url-prefix: ${HD_THUMBNAILS_URL_PREFIX:/api/wiki-thumbs-hd/}

logging:
  level:
    com.rolandapp: INFO