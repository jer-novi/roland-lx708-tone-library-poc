services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pianosounds
      POSTGRES_USER: pianosounds_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in deploy/.env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pianosounds_user -d pianosounds"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ../backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://db:5432/pianosounds
      DB_USERNAME: pianosounds_user
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://roland-lx708-tone-library-poc.vercel.app,http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "188.166.80.4:80:80"
      - "188.166.80.4:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - api

volumes:
  pgdata:
  caddy_data:
