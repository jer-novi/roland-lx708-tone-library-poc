# Isolated development database for testing scrape-scripts, seed data
# mutations, and migrations without touching the production database.
#
# Draait volledig onafhankelijk van deploy/docker-compose.yml:
#   - andere host-poort (55432 i.p.v. 5432)
#   - andere volume-naam (pgdata_dev)
#   - andere database-naam (pianosounds_dev)
#   - andere user/wachtwoord (pianosounds_dev_user)
#
# Gebruik:
#   docker compose -f deploy/docker-compose.dev.yml up -d
#   docker compose -f deploy/docker-compose.dev.yml down       # stop
#   docker compose -f deploy/docker-compose.dev.yml down -v    # stop + data wissen
#
# Om de backend tijdelijk op de dev-DB aan te sluiten kun je in deploy/.env
# DB_URL overschrijven naar jdbc:postgresql://localhost:55432/pianosounds_dev
# (vergeet niet 'm terug te zetten voor productie).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pianosounds_dev
      POSTGRES_USER: pianosounds_dev_user
      POSTGRES_PASSWORD: ${DEV_DB_PASSWORD:-devpass}
    ports:
      # Op host beschikbaar als localhost:55432 zodat scripts/tests er direct
      # bij kunnen zonder de hele stack op te starten.
      - "55432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pianosounds_dev_user -d pianosounds_dev" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata_dev:
